version: '3.8'

services:
  database:
    image: postgres:15
    container_name: auth_service_db
    restart: always
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: password123 # Note: Use secrets or .env for production
      POSTGRES_DB: auth_identity_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: